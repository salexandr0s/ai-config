model = "gpt-5.4"
model_reasoning_effort = "high"

# approval_policy controls when Codex asks for human approval:
#   "always"      — prompts before every command (safest, slowest)
#   "on-failure"  — auto-approves known-safe commands; prompts for unknowns/failures
#   "never"       — auto-approves everything (fastest, use only on trusted repos)
# approval_policy = "on-failure"   # safer: prompts for unknown commands
approval_policy = "never"          # current: auto-approve everything

# sandbox_mode controls filesystem/network isolation:
#   "sandbox"            — runs in a container with no network, read-only fs (safest)
#   "permissive-sandbox" — container with network access but limited fs writes
#   "danger-full-access" — no sandbox at all: full disk + network (use for local dev only)
sandbox_mode = "danger-full-access"

# Add your project paths here
# [projects."/path/to/project"]
# trust_level = "trusted"

# --- Multi-Agent Configuration ---

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.explorer]
description = "Read-only codebase explorer — maps architecture, patterns, dependencies"
config_file = "agents/explorer.toml"

[agents.planner]
description = "Technical planner — designs implementation approaches with steps and testing"
config_file = "agents/planner.toml"

[agents.reviewer]
description = "Quality reviewer — critiques plans and verifies implementations"
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation specialist — executes plans, writes code, runs verification"
config_file = "agents/worker.toml"

[agents.ball-buster]
description = "Brutally honest codebase critic — tears apart every component and questions every decision"
config_file = "agents/ball-buster.toml"
