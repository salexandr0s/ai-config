#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
notify = ["sh", "-lc", "\"$HOME/GitHub/terminal-config/bin/ai-notify\" codex done >/dev/null 2>&1 || true"]

[tui]
notifications = true
notification_method = "auto"
status_line = ["model-with-reasoning", "context-remaining", "current-dir"]

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.team-lead]
description = "Orchestrates multi-agent teams -- manages phases, enforces gates, communicates with user"
config_file = "agents/team-lead.toml"

[agents.researcher]
description = "Read-only codebase explorer -- maps architecture, patterns, dependencies"
config_file = "agents/researcher.toml"

[agents.planner]
description = "Technical planner -- designs implementation approaches with steps and testing"
config_file = "agents/planner.toml"

[agents.coder]
description = "Implementation specialist -- executes plans, writes code, runs verification"
config_file = "agents/coder.toml"

[agents.reviewer]
description = "Quality reviewer -- critiques plans and verifies implementations"
config_file = "agents/reviewer.toml"

[agents.review-fix]
description = "Reviews code and autonomously patches safe issues -- reviewer + coder combined"
config_file = "agents/review-fix.toml"

[agents.phase-implementer]
description = "Autonomous bounded task execution -- self-plans, implements, and verifies a scoped task"
config_file = "agents/phase-implementer.toml"

[agents.ball-buster]
description = "Brutally honest codebase critic -- tears apart every component and questions every decision"
config_file = "agents/ball-buster.toml"

[mcp_servers.shadcn]
command = "npx"
args = ["--yes", "shadcn@4.0.6", "mcp"]
startup_timeout_sec = 25
